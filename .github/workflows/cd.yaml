name: CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERFILE: docker/Dockerfile
  DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}

jobs:
  metadata:
    name: Docker metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      json: ${{ steps.meta.outputs.json }}

    steps:
      - name: Validate Docker Hub repository
        run: |
          set -euo pipefail
          test -n "${DOCKERHUB_REPOSITORY}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPOSITORY }}
          labels: |
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.title=Znuny LTS
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Validate metadata tags
        run: |
          set -euo pipefail
          test -n "${DOCKER_METADATA_OUTPUT_JSON}"
          jq -e '.tags | length > 0' <<< "${DOCKER_METADATA_OUTPUT_JSON}" >/dev/null
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - metadata
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/ppc64le
          - linux/s390x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform name
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.metadata.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKERHUB_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${DIGEST#sha256:}"
          test -n "$digest"
          touch "$RUNNER_TEMP/digests/$digest"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - metadata
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail

          test -n "${DOCKERHUB_REPOSITORY}"
          test -n "${DOCKER_METADATA_OUTPUT_JSON}"
          jq -e '.tags | length > 0' <<< "${DOCKER_METADATA_OUTPUT_JSON}" >/dev/null

          tags="$(jq -r '.tags[] | "-t " + .' <<< "${DOCKER_METADATA_OUTPUT_JSON}" | xargs)"
          digests=""
          for digest_file in *; do
            digests="${digests}${DOCKERHUB_REPOSITORY}@sha256:${digest_file} "
          done

          test -n "$tags"
          test -n "$digests"
          docker buildx imagetools create $tags $digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ needs.metadata.outputs.json }}

      - name: Update Docker Hub overview
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPOSITORY }}
          readme-filepath: README.md
          short-description: Znuny LTS 7.1.6 Docker image with Apache, Perl, PostgreSQL client, and Compose support.
