ServerName localhost

RedirectMatch 302 ^/$ /znuny/index.pl
RedirectMatch 302 ^/otrs/?$ /znuny/index.pl
RedirectMatch 302 ^/otrs/(.*)$ /znuny/$1
RedirectMatch 302 ^/otrs-web/(.*)$ /znuny-web/$1

ScriptAlias /znuny/ "/opt/znuny/bin/cgi-bin/"
Alias /znuny-web/ "/opt/znuny/var/httpd/htdocs/"

<Directory "/opt/znuny/bin/cgi-bin/">
    AllowOverride None
    Options +ExecCGI -Includes
    Require all granted
</Directory>

<Directory "/opt/znuny/var/httpd/htdocs/">
    AllowOverride None
    Options -Indexes +FollowSymLinks
    Require all granted
</Directory>

<IfModule mod_perl.c>
    PerlRequire /opt/znuny/scripts/apache2-perl-startup.pl

<Location /znuny>
    SetHandler perl-script
    PerlResponseHandler ModPerl::Registry
    PerlOptions +ParseHeaders
        Options +ExecCGI
    </Location>
</IfModule>
